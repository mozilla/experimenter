name: Fenix Enrollment Integration Test

on:
  workflow_dispatch:
  schedule:
    - cron: "3 12 * * *"
  push:
    branches:
      - main
      - update_firefox_fenix_beta
      - update_firefox_fenix_release
      - "15340"  # TEMP: drop before promote to ready-for-review
  pull_request:
  merge_group:
    types: [checks_requested]

jobs:
  test:
    name: "Fenix Enrollment (${{ matrix.channel }})"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: beta
            package: org.mozilla.firefox_beta
            apk_namespace: gecko.v2.mozilla-beta.latest.mobile.fenix-beta
            build_env: experimenter/tests/firefox_fenix_beta_build.env
            task_id_var: FIREFOX_FENIX_BETA_TASK_ID
          - channel: release
            package: org.mozilla.firefox
            apk_namespace: gecko.v2.mozilla-release.latest.mobile.fenix-release
            build_env: experimenter/tests/firefox_fenix_release_build.env
            task_id_var: FIREFOX_FENIX_RELEASE_TASK_ID
    env:
      BUILDKIT_PROGRESS: plain
      COMPOSE_ANSI: never
      INTEGRATION_TEST_NGINX_URL: https://localhost
      FENIX_APK_PATH: ${{ github.workspace }}/fenix.apk
      FENIX_RECIPE_PATH: ${{ github.workspace }}/fenix_recipe.json
      FENIX_EXPERIMENT_SLUG: fenix-${{ matrix.channel }}-integration-test
      FENIX_CHANNEL: ${{ matrix.channel }}
      FENIX_PACKAGE: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/check-changed-paths
        id: check-paths
        with:
          paths: "experimenter/experimenter/ experimenter/tests/integration/ experimenter/tests/firefox_fenix_beta_build.env experimenter/tests/firefox_fenix_release_build.env"

      - uses: ./.github/actions/setup-cached-build
        if: steps.check-paths.outputs.should-run == 'true'

      - name: Resolve and download Fenix ${{ matrix.channel }} APK
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          TASK_ID_FILE=${{ matrix.build_env }}
          TASK_ID_VAR=${{ matrix.task_id_var }}
          if [ -f "$TASK_ID_FILE" ] && grep -q "^${TASK_ID_VAR}=.\+" "$TASK_ID_FILE"; then
            # shellcheck disable=SC1090
            . "$TASK_ID_FILE"
            TASK_ID="${!TASK_ID_VAR}"
            APK_URL="https://firefox-ci-tc.services.mozilla.com/api/queue/v1/task/${TASK_ID}/artifacts/public/build/target.x86_64.apk"
            echo "Using pinned ${TASK_ID_VAR}=${TASK_ID}"
          else
            APK_URL="https://firefox-ci-tc.services.mozilla.com/api/index/v1/task/${{ matrix.apk_namespace }}/artifacts/public/build/target.x86_64.apk"
            echo "No pinned task id in $TASK_ID_FILE, using ${{ matrix.apk_namespace }}"
          fi
          echo "Downloading: $APK_URL"
          curl -sSfL -o "$FENIX_APK_PATH" "$APK_URL"

      - name: Install nimbus-cli
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/mozilla/application-services/main/install-nimbus-cli.sh -o /tmp/install-nimbus-cli.sh
          sudo bash /tmp/install-nimbus-cli.sh --directory /usr/local/bin

      - name: Set up Python
        if: steps.check-paths.outputs.should-run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        if: steps.check-paths.outputs.should-run == 'true'
        run: pipx install poetry

      - name: Bring up Experimenter stack (migrate + load features + up_prod)
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          cp .env.integration-tests .env
          make refresh SKIP_DUMMY=1 up_prod_detached

      - name: Wait for Experimenter backend to be ready
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          for i in $(seq 1 60); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost/__lbheartbeat__ || echo "000")
            if [ "$code" = "200" ]; then
              echo "Experimenter backend ready after ${i} polls (HTTP ${code})"
              exit 0
            fi
            echo "Poll ${i}: HTTP ${code}, waiting..."
            sleep 5
          done
          echo "::error::Experimenter backend did not return 200 on /__lbheartbeat__ within 5 minutes"
          docker compose -f docker-compose-prod.yml ps
          docker compose -f docker-compose-prod.yml logs --tail=80 experimenter nginx
          exit 1

      - name: Enable KVM
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prepare Android SDK install dir
        if: steps.check-paths.outputs.should-run == 'true'
        run: |
          sudo mkdir -p /usr/local/lib/android
          sudo chown -R "$USER" /usr/local/lib/android

      - name: Run Fenix enrollment test on emulator
        if: steps.check-paths.outputs.should-run == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          disk-size: 4096M
          emulator-options: -no-window -no-boot-anim -no-audio -accel on -gpu swiftshader_indirect
          script: make integration_test_nimbus_fenix

      - name: Upload test report on failure
        if: failure() && steps.check-paths.outputs.should-run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fenix-${{ matrix.channel }}-test-report
          path: experimenter/tests/integration/test-reports/
          if-no-files-found: ignore

      - name: Teardown
        if: always() && steps.check-paths.outputs.should-run == 'true'
        run: make kill || true
