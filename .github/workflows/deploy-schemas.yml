name: Deploy Schemas

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy Schemas
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/actions/check-changed-paths
        id: check-paths
        with:
          paths: "schemas/"

      - name: Check for version change
        if: steps.check-paths.outputs.should-run == 'true'
        id: version-check
        run: |
          if git diff HEAD~1 schemas/pyproject.toml | grep 'version'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change, skipping deploy"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/retry
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        with:
          label: Build schemas
          run: |
            cp .env.sample .env
            make schemas_build

      - name: Upload to PyPI
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        run: |
          make schemas_deploy_pypi SCHEMAS_ENV="-e TWINE_USERNAME=${{ secrets.TWINE_USERNAME }} -e TWINE_PASSWORD=${{ secrets.TWINE_PASSWORD }}"

      - uses: actions/setup-node@v6
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        with:
          node-version: 24

      - name: Upload to NPM
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        working-directory: schemas
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          FILE_VERSION="$(cat VERSION)"
          if [ "$PKG_VERSION" != "$FILE_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match VERSION ($FILE_VERSION); run 'make schemas_version' and commit" >&2
            exit 1
          fi
          npm publish --access public --provenance
