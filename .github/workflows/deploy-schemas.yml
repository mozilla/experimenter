name: Deploy Schemas

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy Schemas
    runs-on: ubuntu-24.04
    env:
      DOCKER_RUN_INTERACTIVE: ""
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2

      - uses: ./.github/actions/check-changed-paths
        id: check-paths
        with:
          paths: "schemas/"

      - name: Check for version change
        if: steps.check-paths.outputs.should-run == 'true'
        id: version-check
        run: |
          get_version() { sed -n 's/^version *= *"\(.*\)"/\1/p' | head -1; }
          old=$(git show HEAD~1:schemas/pyproject.toml 2>/dev/null | get_version)
          new=$(get_version < schemas/pyproject.toml)
          if [ "$old" != "$new" ]; then
            echo "Version changed: '$old' -> '$new'"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No version change ('$new'), skipping deploy"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/retry
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        with:
          label: Build schemas
          run: |
            cp .env.sample .env
            make schemas_build

      - name: Upload to PyPI
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: schemas/dist/
          skip-existing: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        with:
          node-version: 24

      - name: Upload to NPM
        if: steps.check-paths.outputs.should-run == 'true' && steps.version-check.outputs.changed == 'true'
        working-directory: schemas
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          FILE_VERSION="$(cat VERSION)"
          if [ "$PKG_VERSION" != "$FILE_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match VERSION ($FILE_VERSION); run 'make schemas_version' and commit" >&2
            exit 1
          fi
          npm publish --access public --provenance
