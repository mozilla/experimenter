name: Desktop Targeting Integration Tests

on:
  push:
    branches:
      - main
    paths:
      - "experimenter/**"
      - "application-services/**"
      - ".github/workflows/integration-desktop-targeting.yml"
  pull_request:
    paths:
      - "experimenter/**"
      - "application-services/**"
      - ".github/workflows/integration-desktop-targeting.yml"
  merge_group:
    types: [checks_requested]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: release
            name: Release
          - channel: beta
            name: Beta
          - channel: nightly
            name: Nightly
    name: "Desktop Targeting (${{ matrix.name }} Firefox)"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      FIREFOX_CHANNEL: ${{ matrix.channel }}
      PYTEST_ARGS: -k FIREFOX_DESKTOP -m run_targeting -n 4 --reruns 1 --base-url https://nginx/nimbus/
      PYTEST_BASE_URL: https://nginx/nimbus/
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-cached-build
        with:
          arch: x86_64
          gcp-project-number: ${{ vars.GCPV2_WORKLOAD_IDENTITY_POOL_PROJECT_NUMBER }}

      - uses: ./.github/actions/run-integration-test
        with:
          make-args: FIREFOX_CHANNEL=${{ matrix.channel }}
          artifact-name: desktop-targeting-${{ matrix.channel }}-test-report
