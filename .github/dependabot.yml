version: 2
updates:
  - package-ecosystem: npm
    directory: "/experimenter"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
      - dependency-name: "vega"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
  - package-ecosystem: uv
    directory: "/experimenter"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
  - package-ecosystem: uv
    directory: "/experimenter/tests"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
  - package-ecosystem: uv
    directory: "/cirrus/server"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
  - package-ecosystem: uv
    directory: "/schemas"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
  - package-ecosystem: npm
    directory: "/schemas"
    schedule:
      interval: weekly
    target-branch: main
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-patch"]
      - dependency-name: "vega"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
