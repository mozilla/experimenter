[project]
name = "cirrus"
version = "0.1.0"
description = ""
authors = [{ name = "Mozilla" }]
requires-python = ">=3.11,<4"
# Ranges generated by migrate-to-uv; uv.lock pins exact versions.
# https://docs.astral.sh/uv/concepts/projects/layout/#the-lockfile
dependencies = [
    "ruff>=0.15.0,<0.16",
    "coverage>=7.14.0,<8",
    "fastapi>=0.139.0,<0.140",
    "uvicorn>=0.50.0,<0.51",
    "pytest>=7.2.2,<8",
    "httpx>=0.28.0,<0.29",
    "pytest-cov>=4.0.0,<5",
    "pyright>=1.1.408,<2",
    "apscheduler>=3.11.0,<4",
    "requests>=2.34.0,<3",
    "responses>=0.26.0,<0.27",
    "pytest-asyncio>=0.23.8,<0.24",
    "python-decouple>=3.8,<4",
    "glean-parser>=18.2.0,<19",
    "pytest-mock>=3.15.0,<4",
    "mozilla-nimbus-shared>=2.5.2,<3",
    "sentry-sdk>=2.66.0,<3",
]

[tool.uv]
package = false

[tool.pyright]
typeCheckingMode = "strict"
include = ["cirrus"]
exclude = [
    "**/__pycache__",
    "cirrus/generate_docs.py",
]
reportUnnecessaryTypeIgnoreComment = "warning"
pythonVersion = "3.11"

[tool.ruff]
exclude = ["cirrus/glean"]
line-length = 90

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
select = [
    "A",
    "B",
    "C4",
    "DJ",
    "E",
    "F",
    "I",
    "ISC",
    "N",
    "PIE",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "SIM",
    "TID",
    "UP",
    "W",
    "YTT",
    "PTH",
]
ignore = [
    "A003",
    "A005",
    "B017",
    "B035",
    "B905",
    "DJ001",
    "DJ006",
    "DJ012",
    "E402",
    "E741",
    "F403",
    "N802",
    "N803",
    "N806",
    "N812",
    "N815",
    "PIE796",
    "PTH208",
    "RET503",
    "RET504",
    "RET505",
    "RUF012",
    "RUF059",
    "SIM102",
    "UP006",
    "UP007",
    "UP045",
]
