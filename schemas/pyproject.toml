[project]
name = "mozilla-nimbus-schemas"
version = "3004.0.0"
description = "Schemas used by Mozilla Nimbus and related projects."
authors = [{ name = "mikewilli" }]
requires-python = ">=3.10,<4"
readme = "README.md"
license = "MPL-2.0"
# Ranges generated by migrate-to-uv; uv.lock pins exact versions.
# https://docs.astral.sh/uv/concepts/projects/layout/#the-lockfile
dependencies = [
    "jsonschema>=4.23.0,<5",
    "polyfactory>=2.7.2,<3",
    "pydantic>=2,<3",
    "typing-extensions>=4.0.1",
]

[dependency-groups]
dev = [
    "black>=23.3,<27.0",
    "pytest>=7.3.1,<10.0.0",
    "PyYAML>=6.0,<7",
    "rfc3987>=1.3.8,<2",
    "ruff>=0.5.0,<0.15.1",
    "twine>=5.1.1,<6",
]

[tool.uv]
default-groups = "all"

[tool.uv.build-backend]
module-root = ""

[build-system]
requires = ["uv_build>=0.10.0,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]

[tool.ruff]
# # Enable Pyflakes `E` and `F` codes by default.
lint.select = ["F", "E", "W", "I", "N", "YTT", "A", "C4", "RET", "SIM"]
lint.ignore = [
    "A003",
    "A005",
    "E402",
    "E741",
    "F403",
    "N802",
    "N803",
    "N806",
    "N812",
    "N815",
    "RET503",
    "RET504",
    "RET505",
    "SIM102",
]
line-length = 90
[tool.ruff.lint.pep8-naming]
classmethod-decorators = ["classmethod"]

[tool.flake8]
max-line-length = 90
[tool.black]
line-length = 90
