<div class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom">
  <div class="d-flex align-items-center gap-2">
    <button class="btn p-0 border-0 bg-transparent text-secondary rollout-card-toggle align-self-start mt-1"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#{{ collapse_target }}"
            aria-expanded="true"
            aria-controls="{{ collapse_target }}">
      <i class="fa-solid fa-chevron-right small text-secondary chevron-icon"></i>
    </button>
    <span>
      <span class="fw-semibold small text-body">Overview</span>
      <div class="text-secondary fw-normal mt-1 small">
        Name · Observations &amp; Problem space · Important Links · Project Tags · Subscribers
      </div>
    </span>
  </div>
  {% if show_edit_btn %}
    <button class="btn p-0 border-0 text-secondary"
            type="button"
            aria-label="Edit overview"
            hx-get="{% url 'nimbus-ui-new-update-overview' experiment.slug %}"
            hx-target="#rollout-card-overview"
            hx-swap="outerHTML">
      <i class="fa-regular fa-pen-to-square"></i>
    </button>
  {% endif %}
</div>
