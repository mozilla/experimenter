<div id="rollout-card-{{ card_id }}"
     class="rollout-card accordion accordion-flush rounded-3 border bg-body">
  <div class="accordion-item border-0 bg-transparent">
    <h2 class="accordion-header">
      <div class="d-flex align-items-center">
        <button class="accordion-button bg-transparent shadow-none fw-semibold small text-body collapsed px-4 py-4"
                style="--bs-accordion-btn-icon: none;
                       --bs-accordion-btn-active-icon: none;
                       --bs-accordion-btn-active-color: var(--bs-body-color);
                       --bs-accordion-btn-active-bg: transparent"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapse-{{ card_id }}"
                aria-expanded="false"
                aria-controls="collapse-{{ card_id }}">
          <i class="fa-solid fa-chevron-right small text-secondary flex-shrink-0 me-2 align-self-start mt-1"></i>
          <span>
            {{ title }}
            {% if subtitle %}<div class="text-secondary fw-normal mt-2 small">{{ subtitle }}</div>{% endif %}
          </span>
        </button>
        <button class="btn p-0 border-0 text-secondary flex-shrink-0 me-3"
                aria-label="More options">
          <i class="fa-solid fa-ellipsis"></i>
        </button>
      </div>
    </h2>
    <div class="accordion-collapse collapse" id="collapse-{{ card_id }}">
      <div class="accordion-body">{# Card content goes here #}</div>
    </div>
  </div>
</div>
