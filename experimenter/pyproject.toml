[project]
name = "experimenter"
version = "0.1.0"
description = ""
authors = [{ name = "Mozilla" }]
requires-python = ">=3.11,<4"
# Ranges generated by migrate-to-uv; uv.lock pins exact versions.
# https://docs.astral.sh/uv/concepts/projects/layout/#the-lockfile
dependencies = [
    "asgiref==3.12.1",
    "celery>=5.6.0,<6",
    "click==8.1.6",
    "coverage>=7.15.0,<8",
    "datadog==0.52.0",
    "deepdiff>=8.6.2,<9",
    "dj-inmemorystorage>=2.1.0,<3",
    "django>=5.2,<6",
    "django-admin-rangefilter==0.13.0",
    "django-bootstrap5>=24.3,<25",
    "django-cors-headers==3.14.0",
    "django-countries==7.6",
    "django-filter>=23.5,<24",
    "django-import-export>=3.0,<4",
    "django-markdown2==0.3.1",
    "django-mozilla-product-details==0.14.1",
    "django-prose>=2.1.0,<3",
    "django-redis>=5.4.0,<6",
    "django-storages==1.14",
    "django-test-migrations>=1.5.0,<2",
    "django-types>=0.24.0,<0.25",
    "django-widget-tweaks==1.5.0",
    "djangorestframework==3.17.0",
    "djangorestframework-csv==2.1.1",
    "djlint>=1.36.1,<2",
    "dockerflow>=2024.4.1,<2025",
    "factory_boy==3.3.0",
    "fontawesomefree==6.6.0",
    "glean-parser==18.2.0",
    "google-cloud-storage>=3.13.0,<4",
    "gunicorn==23.0.0",
    "humanize>=4.16.0,<5",
    "inflection>=0.5.1,<0.6",
    "ipdb==0.13.9",
    "jsonschema>=4.26.0,<5",
    "kinto-http==11.11.0",
    "markdown>=3.10.2,<4",
    "markdown2==2.5.0",
    "markus==3.0.0",
    "mock==4.0.3",
    "mozilla-metric-config-parser>=2024.11.1,<2025",
    "mozilla-nimbus-schemas>=3004.0.0,<3005",
    "nh3>=0.3,<0.4",
    "packaging==21.3",
    "parameterized==0.9.0",
    "pillow>=12.3.0,<13",
    "psycopg2>=2.9.10,<3",
    "pydantic>=2,<3",
    "pyjexl>=0.3.0,<0.4",
    "pyparsing==2.4.7",
    "pyright>=1.1.291,<2",
    "pytest>=8.4.0,<9",
    "pytest-cov>=6.3.0,<7",
    "pytest-django==4.12.0",
    "pytest-xdist==2.5.0",
    "python-decouple==3.8",
    "pyyaml>=6.0.1,<7",
    "redis==4.6.0",
    "requests[security]==2.34.0",
    "responses==0.26.0",
    "ruff>=0.15.0,<0.16",
    "scipy>=1.15.0,<2",
    "sentry-sdk>=2.66.0,<3",
    "slack-sdk>=3.43.0,<4",
    "sqlparse==0.5.4",
    "tblib==1.7.0",
    "toml>=0.10.2,<0.11",
    "typing-extensions>=4.16.0,<5",
    "unicodecsv==0.14.1",
    "uritemplate==3.0.1",
    "whitenoise==5.3.0",
]

[tool.uv]
package = false

[tool.pyright]
include = ["experimenter"]
exclude = [
    "**/node_modules",
    "**/__pycache__",
    "**/migrations",
    "experimenter/legacy",
    "**/tests",
    "**/metric-hub-main",
]

reportAttributeAccessIssue = false
reportIndexIssue = false
reportArgumentType = false
reportCallInDefaultInitializer = true
reportConstantRedefinition = false
reportFunctionMemberAccess = false
reportGeneralTypeIssues = false
reportImplicitStringConcatenation = false
reportIncompatibleMethodOverride = false
reportIncompatibleVariableOverride = false
reportMissingModuleSource = false
reportMissingParameterType = false
reportMissingSuperCall = false
reportMissingTypeArgument = true
reportOptionalCall = true
reportOptionalIterable = true
reportOptionalMemberAccess = true
reportOptionalOperand = true
reportOptionalSubscript = true
reportPrivateUsage = true
reportPropertyTypeMismatch = true
reportSelfClsParameterName = false
reportTypedDictNotRequiredAccess = true
reportUninitializedInstanceVariable = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportUnnecessaryTypeIgnoreComment = true
reportUntypedBaseClass = false
reportUntypedClassDecorator = true
reportUntypedFunctionDecorator = false
reportUnusedCallResult = false

[tool.ruff]
# Exclude generated files and a variety of commonly ignored directories.
exclude = [
    "migrations",
    ".tox",
    "node_modules",
    "legacy",
    ".pyenv",
    "experimenter/glean/generated",
    "**/metric-hub-main",
]

# Same as Black.
line-length = 90

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
select = [
    "A",
    "B",
    "C4",
    "DJ",
    "E",
    "F",
    "I",
    "ISC",
    "N",
    "PIE",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "SIM",
    "TID",
    "UP",
    "W",
    "YTT",
    "PTH",
]
ignore = [
    "A003",
    "A005",
    "B017",
    "B035",
    "B905",
    "DJ001",
    "DJ006",
    "DJ012",
    "E402",
    "E741",
    "F403",
    "N802",
    "N803",
    "N806",
    "N812",
    "N815",
    "PIE796",
    "PTH208",
    "RET503",
    "RET504",
    "RET505",
    "RUF012",
    "RUF059",
    "SIM102",
    "UP006",
    "UP007",
    "UP042",
    "UP045",
]

[tool.djlint]
profile = "django"
ignore = "H021,H030,H031"
blank_line_after_tag = "load,extends,include"
indent = 2
